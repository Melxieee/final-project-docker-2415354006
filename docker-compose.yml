services:
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    image: backend-project
    container_name: backend-app
    ports:
      - "${APP_PORT}:3000"
    environment:
     APP_PORT: ${APP_PORT}
     DB_HOST: ${DB_HOST}
     DB_USER: ${DB_USER}
     DB_PASSWORD: ${DB_PASSWORD}
     DB_NAME: ${DB_NAME}
    depends_on:
      - mysql
      # - redis

  mysql:
    image: mysql:8
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: redis-app
    ports:
      - "6379:6379"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin-app
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql

volumes:
  mysql-data: